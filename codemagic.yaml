workflows:
  sample-workflow:
    name: NobleFocusClub workflow
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: NobleFocusClub_apikey
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.app.NobleFocusClub
      vars:
        APP_STORE_APPLE_ID: 6775577710
        BUNDLE_ID: "com.app.NobleFocusClub"
        XCODE_PROJECT: "Noble Focus Club.xcodeproj"
        XCODE_SCHEME: "Noble Focus Club"
    scripts:
      - name: Set up provisioning profiles settings on Xcode project
        script: xcode-project use-profiles
      - name: Increment build number
        script: |
          #!/bin/sh
          cd $CM_BUILD_DIR
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo 0)
          LATEST_BUILD_NUMBER=${LATEST_BUILD_NUMBER:-0}
          NEW_BUILD_NUMBER=${CM_BUILD_NUMBER:-0}
          if [ "$NEW_BUILD_NUMBER" -le "$LATEST_BUILD_NUMBER" ]; then
            NEW_BUILD_NUMBER=$((LATEST_BUILD_NUMBER + 1))
          fi
          echo "Setting build number to $NEW_BUILD_NUMBER (latest App Store build: $LATEST_BUILD_NUMBER)"
          agvtool new-version -all "$NEW_BUILD_NUMBER"
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_app_store: true
        cancel_previous_submissions: true
        release_type: MANUAL
